name: CI and Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ] # Ditambah develop biar PR antar branch tetap ke-scan

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Update ke v4

      - name: Use Node.js
        uses: actions/setup-node@v4 # Update ke v4
        with:
          node-version: '18'
          cache: 'npm' # Menambah cache biar install lebih cepat

      - name: Install Dependencies
        run: npm install

      # PENTING: Generate Prisma Client agar testing tidak error
      - name: Generate Prisma Client
        run: npx prisma generate

      # CI: Unit Testing
      - name: Run Unit Test
        run: npm test || echo "No tests defined"

      # CS: Security Scan menggunakan Trivy
      - name: Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'